<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GRIDPLAY — Music Player</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="scene">
    <div class="card">

      <div class="card-chrome">
        <div class="dots">
          <span class="dot dot-a"></span>
          <span class="dot dot-b"></span>
          <span class="dot dot-c"></span>
        </div>
        <span class="chrome-label">GRIDPLAY // PLAYER.exe</span>
        <span class="chrome-status" id="statusTag">IDLE</span>
      </div>

      <div class="art-zone">
        <div class="art-frame" id="artFrame">
          <div class="scanline"></div>
          <div class="art-glyph">♫</div>
        </div>
      </div>

      <div class="meta">
        <h1 class="title" id="trackTitle">NO_SIGNAL</h1>
        <p class="artist" id="trackArtist">load a track to begin</p>
      </div>

      <canvas class="bars" id="visualizer" height="48"></canvas>

      <div class="progress" id="progressWrap" tabindex="0" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="timeCurrent">00:00</span>
          <span id="timeTotal">00:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-ghost" id="prevBtn" aria-label="Previous">◂◂</button>
        <button class="btn btn-main" id="playBtn" aria-label="Play">
          <span class="play-glyph" id="playGlyph">▶</span>
        </button>
        <button class="btn btn-ghost" id="nextBtn" aria-label="Next">▸▸</button>
      </div>

      <div class="footer-row">
        <label class="upload-pill" for="fileInput">
          + ADD TRACK
          <input type="file" id="fileInput" accept="audio/*" multiple hidden />
        </label>
        <div class="volume" id="volumeWrap">
          <span class="vol-icon">VOL</span>
          <div class="volume-track">
            <div class="volume-fill" id="volumeFill" style="width:75%"></div>
          </div>
        </div>
      </div>

      <ul class="playlist" id="playlist"></ul>

    </div>
    <div class="toast" id="toast"></div>
  </div>

  <audio id="audioEl" preload="auto"></audio>
  <script src="js/app.js"></script>
</body>
</html>
