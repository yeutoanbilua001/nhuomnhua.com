<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wavelength — Music Player</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <!-- Sidebar / Playlist -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-mark">◈</span>
          <span class="logo-text">Wavelength</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close playlist">✕</button>
      </div>

      <div class="sidebar-section">
        <h3 class="section-label">Now Playing</h3>
        <ul class="playlist" id="playlist" role="listbox" aria-label="Playlist"></ul>
      </div>

      <div class="sidebar-section">
        <h3 class="section-label">Upload Tracks</h3>
        <label class="upload-btn" for="fileInput">
          <span class="upload-icon">↑</span>
          Add audio files
          <input type="file" id="fileInput" accept="audio/*" multiple hidden />
        </label>
      </div>
    </aside>

    <!-- Main player -->
    <main class="player">
      <!-- Art panel -->
      <section class="art-panel">
        <div class="art-frame" id="artFrame">
          <div class="art-placeholder" id="artPlaceholder">
            <div class="vinyl">
              <div class="vinyl-groove"></div>
              <div class="vinyl-center"></div>
            </div>
          </div>
          <img class="album-art" id="albumArt" src="" alt="Album art" hidden />
        </div>
        <div class="art-glow" id="artGlow"></div>
      </section>

      <!-- Controls panel -->
      <section class="controls-panel">
        <!-- Top bar -->
        <div class="top-bar">
          <button class="icon-btn" id="menuBtn" aria-label="Open playlist">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="4" width="16" height="2" rx="1" fill="currentColor"/>
              <rect x="2" y="9" width="11" height="2" rx="1" fill="currentColor"/>
              <rect x="2" y="14" width="13" height="2" rx="1" fill="currentColor"/>
            </svg>
          </button>
          <span class="top-label">Music Player</span>
          <button class="icon-btn" id="favoriteBtn" aria-label="Favorite">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 16.5L4.5 11C3 9.5 3 7 4.5 5.5C6 4 8.5 4 10 5.5C11.5 4 14 4 15.5 5.5C17 7 17 9.5 15.5 11L10 16.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- Track info -->
        <div class="track-info">
          <div class="track-title-wrap">
            <h1 class="track-title" id="trackTitle">No track loaded</h1>
          </div>
          <p class="track-artist" id="trackArtist">Select a track to play</p>
          <div class="track-tags">
            <span class="tag" id="trackGenre">—</span>
          </div>
        </div>

        <!-- Waveform visualizer -->
        <div class="visualizer-wrap">
          <canvas class="visualizer" id="visualizer" width="600" height="80" aria-hidden="true"></canvas>
          <div class="visualizer-shade visualizer-shade--left"></div>
          <div class="visualizer-shade visualizer-shade--right"></div>
        </div>

        <!-- Progress -->
        <div class="progress-section">
          <div class="progress-bar-wrap" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0" id="progressWrap">
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-thumb" id="progressThumb"></div>
            </div>
          </div>
          <div class="time-row">
            <span class="time-label" id="timeCurrentLabel">0:00</span>
            <span class="time-label" id="timeTotalLabel">0:00</span>
          </div>
        </div>

        <!-- Main controls -->
        <div class="main-controls">
          <button class="ctrl-btn ctrl-shuffle" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 6h2.5l8 8H17M17 6h-3.5l-2 2M7.5 12l-2 2H3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 4l2 2-2 2M15 14l2 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <button class="ctrl-btn ctrl-prev" id="prevBtn" aria-label="Previous">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M5 5v12M7 11l10-6v12L7 11z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <button class="ctrl-btn ctrl-play" id="playBtn" aria-label="Play">
            <svg class="icon-play" width="28" height="28" viewBox="0 0 28 28" fill="none">
              <path d="M9 6l14 8-14 8V6z" fill="currentColor"/>
            </svg>
            <svg class="icon-pause" width="28" height="28" viewBox="0 0 28 28" fill="none" hidden>
              <rect x="7" y="5" width="4" height="18" rx="1.5" fill="currentColor"/>
              <rect x="17" y="5" width="4" height="18" rx="1.5" fill="currentColor"/>
            </svg>
          </button>

          <button class="ctrl-btn ctrl-next" id="nextBtn" aria-label="Next">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M17 5v12M15 11L5 5v12l10-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <button class="ctrl-btn ctrl-repeat" id="repeatBtn" aria-label="Repeat" title="Repeat">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 7h14M3 13h14M15 5l2 2-2 2M5 11l-2 2 2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- Volume & extra -->
        <div class="bottom-bar">
          <div class="volume-group">
            <button class="icon-btn volume-icon" id="muteBtn" aria-label="Mute">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 6.5h3l4-3v11l-4-3H2v-5zM13 5.5c1.5 1 2.5 2.5 2.5 3.5s-1 2.5-2.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M15 3c2.5 1.8 3.5 4 3.5 6s-1 4.2-3.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="vol-outer"/>
              </svg>
            </button>
            <div class="volume-bar-wrap" id="volumeWrap">
              <div class="volume-track">
                <div class="volume-fill" id="volumeFill" style="width:75%"></div>
                <div class="volume-thumb" id="volumeThumb" style="left:75%"></div>
              </div>
            </div>
          </div>

          <div class="speed-group">
            <label class="speed-label" for="speedSelect">Speed</label>
            <select class="speed-select" id="speedSelect" aria-label="Playback speed">
              <option value="0.5">0.5×</option>
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
            </select>
          </div>
        </div>

      </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </div>

  <audio id="audioEl" preload="auto"></audio>
  <script src="js/app.js"></script>
</body>
</html>
