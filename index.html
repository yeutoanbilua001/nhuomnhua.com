<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Music Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <div class="player-container">
        <div class="img-container">
            <img src="https://unsplash.com" alt="Album Art" id="music-img">
        </div>
        <h2 id="title">Song Title</h2>
        <h3 id="artist">Artist Name</h3>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
            <div class="duration-wrapper">
                <span id="current-time">0:00</span>
                <span id="duration">3:30</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="player-controls">
            <i class="fas fa-backward" id="prev" title="Previous"></i>
            <i class="fas fa-play main-button" id="play" title="Play"></i>
            <i class="fas fa-forward" id="next" title="Next"></i>
        </div>

        <!-- Volume Control -->
        <div class="volume-container">
            <i class="fas fa-volume-up" id="volume-icon"></i>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <!-- Audio Element -->
    <audio src="music/song1.mp3" id="audio"></audio>

    <script src="script.js"></script>
</body>
</html>
